{% extends "web/base.html" %}

{% block title %}Verification link invalid{% endblock %}

{% block content %}

  <div class="auth-card">
    <p class="eyebrow">Verification issue</p>
    <h1>This verification link is invalid or expired.</h1>

  </div>
</section>
{% endblock %}
